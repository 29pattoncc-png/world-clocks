<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Time Tool</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌍 World Time</h1>
            <p class="subtitle">Current time across the globe</p>
        </header>

        <div class="controls">
            <input type="text" id="searchInput" class="search-box" placeholder="Search cities...">
            <select id="sortSelect" class="sort-dropdown">
                <option value="timezone">Sort by Timezone</option>
                <option value="alphabetical">Sort Alphabetically</option>
            </select>
        </div>

        <div id="clocksContainer" class="clocks-grid">
            <!-- Clocks will be generated here -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
